<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Avisomap - Control de Plagas</title>
    <meta name="description" content="Gestión de avisos con mapas">
    <meta name="theme-color" content="#2e7d32">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-overlay hidden">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-map-location-dot"></i></div>
            <h2>Bienvenido a Avisomap</h2>
            <p>Identifícate para gestionar tus avisos</p>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Entrar</button>
                <button class="auth-tab" id="tab-signup">Registro</button>
            </div>

            <form id="auth-form">
                <div class="form-group" style="text-align: left;">
                    <label>Email</label>
                    <input type="email" id="auth-email" class="form-input" required placeholder="tu@email.com">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Contraseña</label>
                    <input type="password" id="auth-password" class="form-input" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" id="auth-submit">INICIAR SESIÓN</button>
            </form>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="app" class="hidden">
        <nav class="navbar">
            <div class="nav-logo"><i class="fas fa-map-location-dot"></i> <span>Avisomap</span></div>
            <div class="nav-actions">
                <button id="sync-btn"><i class="fas fa-sync"></i></button>
                <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <main id="main-content">
            <div id="view-container">
                <div class="loading-screen"><div class="spinner"></div><p>Cargando Avisomap...</p></div>
            </div>
        </main>

        <nav class="tab-bar">
            <button class="tab-item" data-view="list"><i class="fas fa-list-ul"></i><span>Avisos</span></button>
            <button class="tab-item" data-view="form"><i class="fas fa-circle-plus"></i><span>Nuevo</span></button>
            <button class="tab-item" data-view="calendar"><i class="fas fa-calendar-alt"></i><span>Agenda</span></button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <script>
        // --- Configuration ---
        const SUPABASE_URL = 'https://cuhbqppdndzvxvlhlszn.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGJxcHBkbmR6dnh2bGhsc3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzE4MTIsImV4cCI6MjA4NzUwNzgxMn0.OjYCEu7btiWjA9gvm3lB5bpfMJYBWx3J5LJsO22RrJk'; 
        let supabaseClient = null;
        let currentUser = null;
        let currentView = 'list';
        let currentCalendarDate = new Date();
        let currentEditingId = null;
        let avisos = [];
        let viewContainer, tabItems, appUI, loginScreen;

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            viewContainer = document.getElementById('view-container');
            tabItems = document.querySelectorAll('.tab-item');
            appUI = document.getElementById('app');
            loginScreen = document.getElementById('login-screen');

            // Initialize Supabase if credentials are provided
            if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkUser();
            } else {
                // Mockup mode for preview
                loginScreen.classList.add('hidden');
                appUI.classList.remove('hidden');
                switchView('list');
            }

            setupEventListeners();
        });

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                appUI.classList.remove('hidden');
                loadRealData();
            } else {
                loginScreen.classList.remove('hidden');
                appUI.classList.add('hidden');
            }
        }

        function setupEventListeners() {
            tabItems.forEach(item => item.addEventListener('click', () => switchView(item.dataset.view)));
            
            document.getElementById('auth-form').addEventListener('submit', handleAuth);
            document.getElementById('logout-btn').addEventListener('click', () => supabaseClient.auth.signOut().then(() => checkUser()));
            
            document.getElementById('tab-login').onclick = () => setAuthMode('login');
            document.getElementById('tab-signup').onclick = () => setAuthMode('signup');
        }

        // --- Auth Logic ---
        let authMode = 'login';
        function setAuthMode(mode) {
            authMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
            document.getElementById('auth-submit').innerText = mode === 'login' ? 'INICIAR SESIÓN' : 'CREAR CUENTA';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('auth-submit');
            btn.disabled = true;

            try {
                let result;
                if (authMode === 'login') {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                } else {
                    result = await supabaseClient.auth.signUp({ email, password });
                    if (!result.error) alert('¡Revisa tu email para confirmar el registro!');
                }

                if (result.error) throw result.error;
                checkUser();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        // --- Data Logic ---
        async function loadRealData() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient
                .from('avisos')
                .select('*')
                .order('fecha', { ascending: false });
            
            if (data) {
                avisos = data;
                renderView(currentView);
            }
        }

        function switchView(view) {
            currentView = view;
            tabItems.forEach(item => item.classList.toggle('active', item.dataset.view === view));
            renderView(view);
        }

        function renderView(view) {
            if (view === 'list') renderListView();
            if (view === 'form') renderFormView();
            if (view === 'calendar') renderCalendarView();
        }

        // --- List View ---
        function renderListView() {
            viewContainer.innerHTML = `<div class="view-header"><h2>Mis Avisos</h2><p class="subtitle">Trabajos registrados</p></div><div id="avisos-list"></div>`;
            const listEl = document.getElementById('avisos-list');
            
            if (avisos.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; padding:3rem; color:gray;"><i class="fas fa-folder-open" style="font-size:3rem; margin-bottom:1rem;"></i><p>No hay avisos guardados</p></div>';
                return;
            }

            const groups = {};
            avisos.forEach(av => {
                const date = new Date(av.fecha);
                const key = date.toLocaleString('es-ES', { month: 'long', year: 'numeric' });
                if (!groups[key]) groups[key] = [];
                groups[key].push(av);
            });

            listEl.innerHTML = Object.keys(groups).map((group, index) => `
                <div class="month-group ${index > 0 ? 'collapsed' : ''}" id="group-${index}">
                    <div class="group-header" onclick="toggleGroup(${index})">
                        <i class="fas fa-calendar-day"></i>
                        <h4>${group}</h4>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="group-content">
                        ${groups[group].map(aviso => `
                            <div class="card aviso-card animate-in">
                                <div class="card-header">
                                    <div class="pest-icon" style="font-size:1.5rem;">${getPestIcon(aviso.plaga)}</div>
                                    <div class="card-title"><h3>${aviso.direccion}</h3><span class="badge locality">${aviso.localidad}</span></div>
                                </div>
                                <div class="card-body">
                                    <div class="info-row">
                                        <span class="badge date">${aviso.fecha}</span>
                                        <span class="badge time">${aviso.hora}</span>
                                    </div>
                                    <p class="card-notes">${aviso.notas || 'Sin notas'}</p>
                                </div>
                                <div class="card-footer">
                                    <div class="card-actions">
                                        <button class="action-btn edit" onclick="editAviso('${aviso.id}')" title="Editar"><i class="fas fa-edit"></i></button>
                                        <button class="action-btn delete" onclick="deleteAviso('${aviso.id}')" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                                    </div>
                                    ${aviso.archivo_url ? `<button class="action-btn view" onclick="window.open('${aviso.archivo_url}', '_blank')" title="Ver adjunto"><i class="fas fa-eye"></i></button>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- Form View with Storage ---
        function renderFormView(editData = null) {
            currentEditingId = editData ? editData.id : null;
            
            viewContainer.innerHTML = `
                <div class="view-header"><h2>${editData ? 'Editar' : 'Nuevo'} Aviso</h2></div>
                <form id="aviso-form" class="animate-in">
                    <div class="form-group">
                        <label>Dirección</label>
                        <div class="input-with-icon" style="position:relative;">
                            <i class="fas fa-search"></i>
                            <input type="text" id="direccion" class="form-input" placeholder="Escribe dirección..." required autocomplete="off" value="${editData ? editData.direccion : ''}">
                            <div id="suggestions" class="suggestions-list hidden"></div>
                        </div>
                    </div>
                    <div class="form-group"><label>Localidad</label><input type="text" id="localidad" class="form-input" required value="${editData ? editData.localidad : ''}"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Fecha</label><input type="date" id="fecha" class="form-input" required value="${editData ? editData.fecha : new Date().toISOString().split('T')[0]}"></div>
                        <div class="form-group"><label>Hora</label><input type="time" id="hora" class="form-input" required value="${editData ? editData.hora : new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})}"></div>
                    </div>
                    <div class="form-group">
                        <label>Plaga</label>
                        <select id="plaga" class="form-input">
                            ${['Ratones', 'Ratas', 'Cucarachas', 'Hormigas', 'Pulgas'].map(p => `<option ${editData?.plaga === p ? 'selected' : ''}>${p}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group"><label>Notas</label><textarea id="notas" class="form-input" rows="3">${editData ? editData.notas : ''}</textarea></div>
                    <div class="form-group">
                        <label>Adjuntar Foto / Albarán ${editData?.archivo_url ? '(Opcional: cambiar)' : ''}</label>
                        <div class="file-upload" onclick="document.getElementById('archivo').click()">
                            <i class="fas fa-camera"></i> <span id="file-name">${editData?.archivo_url ? 'Cambiar archivo' : 'Toca para subir'}</span>
                            <input type="file" id="archivo" accept="image/*,.pdf" style="display:none;" onchange="document.getElementById('file-name').innerText = this.files[0].name">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="save-btn">${editData ? 'ACTUALIZAR' : 'GUARDAR'} AVISO</button>
                    ${editData ? `<button type="button" class="btn-detail" style="margin-top:0.5rem;" onclick="switchView('list')">CANCELAR</button>` : ''}
                </form>
            `;

            // Autocomplete Logic
            const dirInput = document.getElementById('direccion');
            const suggestionsEl = document.getElementById('suggestions');
            dirInput.addEventListener('input', debounce(async (e) => {
                const q = e.target.value;
                if (q.length < 3) { suggestionsEl.classList.add('hidden'); return; }
                suggestionsEl.innerHTML = '<div class="suggestion-item">Buscando portal exacto...</div>';
                suggestionsEl.classList.remove('hidden');
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=es&limit=5&addressdetails=1`, {
                        headers: { 'Accept-Language': 'es' }
                    });
                    const data = await res.json();
                    
                    if (data.length === 0) {
                        suggestionsEl.innerHTML = '<div class="suggestion-item">Sin resultados</div>';
                        return;
                    }

                    suggestionsEl.innerHTML = data.map(item => {
                        const addr = item.address;
                        const street = addr.road || addr.pedestrian || addr.path || '';
                        const number = addr.house_number || '';
                        const city = addr.city || addr.town || addr.village || addr.suburb || '';
                        
                        // Formateamos una etiqueta más legible y exacta
                        let label = street;
                        if (number) label += `, ${number}`;
                        if (city) label += ` (${city})`;
                        
                        // Si no hay calle bien definida, usamos el display_name original
                        const finalLabel = label.length > 5 ? label : item.display_name;
                        
                        return `<div class="suggestion-item" onclick="selectSuggestion('${finalLabel.replace(/'/g, "\\'")}', '${city.replace(/'/g, "\\'")}')">
                            <i class="fas fa-location-dot" style="margin-right:8px; color:var(--primary);"></i>
                            <strong>${street} ${number ? 'nº ' + number : ''}</strong><br>
                            <small style="color:gray;">${item.display_name}</small>
                        </div>`;
                    }).join('');
                } catch (err) { 
                    suggestionsEl.innerHTML = `<div class="suggestion-item" style="color:red;">Error: ${err.message}</div>`; 
                }
            }, 400));

            document.getElementById('aviso-form').addEventListener('submit', saveAviso);
        }

        window.selectSuggestion = (label, city) => {
            document.getElementById('direccion').value = label;
            document.getElementById('localidad').value = city;
            document.getElementById('suggestions').classList.add('hidden');
        };

        async function saveAviso(e) {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = 'Guardando...';

            try {
                let fileUrl = null;
                const file = document.getElementById('archivo').files[0];
                
                if (file && supabaseClient) {
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data, error } = await supabaseClient.storage
                        .from('avisomap_files')
                        .upload(fileName, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = supabaseClient.storage.from('avisomap_files').getPublicUrl(fileName);
                    fileUrl = publicUrl;
                }

                const payload = {
                    user_id: currentUser?.id,
                    direccion: document.getElementById('direccion').value,
                    localidad: document.getElementById('localidad').value,
                    fecha: document.getElementById('fecha').value,
                    hora: document.getElementById('hora').value,
                    plaga: document.getElementById('plaga').value,
                    notas: document.getElementById('notas').value,
                };
                if (fileUrl) payload.archivo_url = fileUrl;

                if (supabaseClient) {
                    let result;
                    if (currentEditingId) {
                        result = await supabaseClient.from('avisos').update(payload).eq('id', currentEditingId);
                    } else {
                        result = await supabaseClient.from('avisos').insert(payload);
                    }
                    if (result.error) throw result.error;
                } else {
                    if (currentEditingId) {
                        const idx = avisos.findIndex(a => a.id === currentEditingId);
                        avisos[idx] = { ...avisos[idx], ...payload };
                    } else {
                        avisos.unshift({ ...payload, id: Date.now().toString() });
                    }
                }

                alert(currentEditingId ? '¡Aviso actualizado!' : '¡Aviso guardado con éxito!');
                loadRealData();
                switchView('list');
            } catch (err) {
                alert('Error al guardar: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = currentEditingId ? 'ACTUALIZAR AVISO' : 'GUARDAR AVISO';
            }
        }

        window.editAviso = (id) => {
            const aviso = avisos.find(a => a.id === id);
            if (aviso) renderFormView(aviso);
        };

        window.deleteAviso = async (id) => {
            if (!confirm('¿Seguro que quieres eliminar este aviso?')) return;
            
            try {
                if (supabaseClient) {
                    const { error } = await supabaseClient.from('avisos').delete().eq('id', id);
                    if (error) throw error;
                } else {
                    avisos = avisos.filter(a => a.id !== id);
                }
                loadRealData();
            } catch (err) {
                alert('Error al eliminar: ' + err.message);
            }
        };

        // --- Calendar Logic ---
        function renderCalendarView() {
            const monthLabel = currentCalendarDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' });
            
            viewContainer.innerHTML = `
                <div class="view-header">
                    <h2>Agenda</h2>
                    <p class="subtitle">Planificación mensual</p>
                </div>
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button class="month-nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                        <div class="group-header" style="margin-bottom:0;">
                            <i class="fas fa-calendar-alt"></i>
                            <h4>${monthLabel}</h4>
                        </div>
                        <button class="month-nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="calendar-grid" id="calendar-body"></div>
                    <div id="day-details" style="margin-top:2rem;"></div>
                </div>
            `;
            
            const body = document.getElementById('calendar-body');
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Adjust firstDay (0 is Sunday, we want 1 to be Monday)
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;
            
            let html = ['lun', 'mar', 'mie', 'jue', 'vie', 'sab', 'dom'].map(d => `<div class="calendar-day-name">${d}</div>`).join('');
            
            // Empty spaces before first day
            for (let i = 0; i < startOffset; i++) {
                html += `<div class="calendar-day empty"></div>`;
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const hasAviso = avisos.some(a => a.fecha === dateStr);
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                html += `<div class="calendar-day ${hasAviso ? 'has-aviso' : ''} ${isToday ? 'active' : ''}" onclick="showDayDetails('${dateStr}')">${i}</div>`;
            }
            body.innerHTML = html;
        }

        window.changeMonth = (delta) => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta);
            renderCalendarView();
        };

        window.toggleGroup = (index) => {
            const el = document.getElementById(`group-${index}`);
            el.classList.toggle('collapsed');
        };

        window.showDayDetails = (date) => {
            const detailsEl = document.getElementById('day-details');
            const dayAvisos = avisos.filter(a => a.fecha === date);
            detailsEl.innerHTML = dayAvisos.length === 0 ? `<p style="text-align:center; color:gray;">Sin avisos para el ${date}</p>` : 
                `<h4>Avisos para ${date}</h4>` + dayAvisos.map(a => `<div class="card" style="padding:10px; margin-top:5px;"><strong>${a.hora}</strong> - ${a.direccion}</div>`).join('');
        }

        function getPestIcon(p) { const i = { 'Ratones': '🐁', 'Ratas': '🐀', 'Cucarachas': '🪳', 'Hormigas': '🐜', 'Pulgas': '🦟' }; return i[p] || '🔍'; }
        function debounce(f, w) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f(...a), w); }; }
    </script>
</body>
</html>
